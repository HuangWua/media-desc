<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长图 OCR 可视化 — c.png (1080×6868)</title>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --text: #ddd;
    --muted: #888; --accent: #e4a853; --border: #2a2a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'SF Pro', sans-serif; }
  .topbar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar h1 { font-size: 18px; color: var(--accent); }
  .topbar .chip {
    font-size: 11px; padding: 3px 10px; border-radius: 12px;
    background: #e4532e20; color: #e4532e; border: 1px solid #e4532e40;
    font-weight: 600;
  }
  .topbar .stat { font-size: 12px; color: var(--muted); margin-left: auto; }
  .topbar .stat b { color: var(--accent); font-size: 16px; }

  .layout { display: flex; height: calc(100vh - 57px); }
  .pane-img {
    flex: 1; overflow-y: auto; background: #000;
    border-right: 1px solid var(--border);
  }
  .pane-img img { width: 100%; display: block; }
  .pane-text {
    flex: 1; overflow-y: auto; padding: 0;
  }
  .block {
    display: flex; gap: 12px; align-items: baseline;
    padding: 6px 16px; margin: 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 14px; line-height: 1.6;
    transition: background 0.12s;
  }
  .block:hover { background: rgba(228,168,83,0.08); }
  .block .n {
    min-width: 30px; text-align: right; font-size: 11px;
    color: var(--muted); flex-shrink: 0;
  }
  .block .txt { flex: 1; }
  .block .cf {
    font-size: 10px; color: var(--muted); flex-shrink: 0;
    min-width: 36px; text-align: right;
  }
  .info-row {
    padding: 12px 16px; font-size: 12px; color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 20px;
  }
  .info-row b { color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <h1>📷 c.png — 长图 OCR 结果</h1>
  <span class="chip">1080×6868px · 长图安全切片</span>
  <span class="stat">OCR 块: <b>55</b> &nbsp; 平均置信度: <b>0.97</b> &nbsp; 场景: <b>generic</b></span>
</div>

<div class="layout">
  <div class="pane-img">
    <img src="imgs/c.png" alt="c.png (6868px)">
  </div>
  <div class="pane-text" id="ocr">
  </div>
</div>

<script>
const blocks = [
"直接发国籍不就不是境外势力了？",
"2015年，乌克兰GDP下降9.9%，工业生产总值",
"下降13.4%，超过500万人失业。",
"到2018年，乌克兰与示威运动之前相比，已失",
"去了20%的工业生产能力，经济结构几乎完全被",
"改变。波罗申科本人更是屡被对手指责利用权力",
"中饱私囊，大发国难财。",
"更重要的是，为了给西方交投名状，和俄国划清",
"界限，乌克兰默许了纳粹意识形态抬头",
"之前那个乌克兰少年向二战老兵举纳粹手势的新",
"闻可能很多人看过，答案很简单，苏联是击败纳",
"粹的英雄，抹黑苏联，往往伴随着美化纳粹。此",
"外还有一个就是历史原因，当年二战时乌克兰这",
"边是有成建制伪军的。",
"顺带，前两年香港时乌克兰纳粹分子也登场过，",
"道理也简单",
"大家背后的金主是同一个，作为颜色革命成功地",
"区，先行者自然要来手把手教你怎么搞事了，所",
"以那副世界名画，是有历史原因的~关键在于，",
"你怎么理解“好的结局”",
"顺带，著名女权组织—费曼，也是诞生在乌克",
"兰，最开始是由美国的民主基金会支持。",
"所以，为什么说乌克兰是颜色革命试验场教科",
"书，从左到右所有方法，你现在见过的各路思",
"潮，乌克兰都实践过上演过，积累了丰富的经",
"验。",
"最终，在不断的挑动下，乌克兰内部引发了亲",
"俄，俄族民众和亲西方的冲突不断扩大，出现了",
"诸如敖德萨纵火案等惨剧。",
"所以有人说，要反战要反思，OK没问题，关键",
"在于你要认认真真的学习历史去反对战争",
"乌克兰的寡头们中饱私囊大肆卖国时你不说话",
"乌克兰的颜革分子在西方支持下不断挑事引发对",
"立时你不说话",
"乌克兰的民选政府被颜色革命推翻颠覆时你还不",
"说话",
"乌克兰的民兵打出纳粹旗号，迫害俄族民众时你",
"不说话",

"乱时你还是不说话",
"甚至之前明斯克协议时，俄国希望和平谈判解决",
"问题“普京曾强调，协议是解决冲突的唯一可能",
"方案”，然后—基辅不想履行时，你依然不说话",
"最后，经过十年来不断的渲染和对立，冲突不断",
"扩大，最终引发战争了，",
"你表示“不论怎样，战争都是不对的”",
"抛开前面的99步不谈，难道你就没有一点问题",
"吗？",
"乌克兰怎么从一个曾经的地区强国富国，沦落成",
"今天这样经济崩盘社会动荡，冲突对立不断爆",
"发，甚至被称为欧洲子宫的，把历史拉个清单其",
"实很清楚。",
"真要反思，就一条",
"乌克兰乱局是美国三十年来不断输出颜色革命挑",
"起对立引发冲突的最终结果，要反战，先要从根"
];
const ocr = document.getElementById('ocr');
blocks.forEach((t, i) => {
  const div = document.createElement('div');
  div.className = 'block';
  div.innerHTML = '<span class="n">'+(i+1)+'</span><span class="txt">'+t.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</span><span class="cf">0.97</span>';
  ocr.appendChild(div);
});
</script>

</body>
</html>
